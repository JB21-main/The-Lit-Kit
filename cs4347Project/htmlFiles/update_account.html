<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--links for fonts and style sheet-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Junge&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <!---->
    <title>Update Account</title>
</head>
<body class="centered-body">
    <!--div for editing account details-->
    <div class="div-border">
        <h1>Account Details</h1>

        <!--Replace placeholders with user name, email, pref etc once connected to db-->
        <label for="name">Name:</label>
        <input type="text" placeholder="Jane Doe"  id="name" name="name">
        <label for="email">Email:</label>
        <input type="text" placeholder="jane.doe@example.com"  id="email" name="email">
    
        <h1>Preferences</h1>
        <h3>Your top 3 genres</h3>
        
            <label for="genre1">First Choice</label>
            <select name="genre1" id="genre1">
                <option value="Broadcasting & Television">Broadcasting & Television</option>
                <option value="Children & Young Adult">Children & Young Adult</option>
                <option value="Classics">Classics</option>
                <option value="Comedy & Humor">Comedy & Humor</option>
            </select>

            <label for="genre2">Second Choice</label>
            <select name="genre2" id="genre2">
                <option value="Broadcasting & Television">Broadcasting & Television</option>
                <option value="Children & Young Adult">Children & Young Adult</option>
                <option value="Classics">Classics</option>
                <option value="Comedy & Humor">Comedy & Humor</option>
            </select>

             <label for="genre3">Third Choice</label>
            <select name="genre3" id="genre3">
                <option value="Broadcasting & Television">Broadcasting & Television</option>
                <option value="Children & Young Adult">Children & Young Adult</option>
                <option value="Classics">Classics</option>
                <option value="Comedy & Humor">Comedy & Humor</option>
            </select>
            <div class="div-button">
                <button>Update Account</button>
            </div>
    </div>
    <!--div for deleting account- would be good to later on add an are you sure message-->
    <div class="div-border">
        <h1>Delete Account</h1>
        <div class="div-button">
            <button class="delete-button">Delete Account</button>
        </div>
    </div>
   
    
</body>
<footer></footer>
</html>
