<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--links for fonts and style sheet-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Junge&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <!---->
    <title>Edit Book</title>
</head>
<body class="centered-body">
    <div class="div-border">
        <h1>Edit Book</h1>
        <h3>Book Information</h3>
        <label for="title">Title</label>
        <input type="text"   id="title">

        <label for="author-name">Author Name</label>
        <input type="text" id="author-name">

        <label for="author-id">Author ID</label>
        <input type="text" id="author-id">
        <hr>

        <label for="genre-name">Genre Name</label>
        <input type="text" id="genre-name">

        <label for="genre-id">Genre ID</label>
        <input type="text" id="genre-id">
        <hr>

        <label for="barcode">Barcode</label>
        <input type="text" id="barcode">

        <label for="call-number">Call Number</label>
        <input type="text" id="call-number">

        <label for="mms-id">mms ID</label>
        <input type="text" id="mms-id">

        <label for="inventory">Inventory</label>
        <input type="text" id="inventory">
        <div class="div-button">
            <button>Update Book</button>
        </div>
    </div>
    <div class="div-border">
        <h1>Delete Book</h1>
        <div class="div-button">
            <button class="delete-button">Delete Book</button>
        </div>
    </div>
    
</body>
<footer></footer>
</html>
